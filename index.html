<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BikDocs | Modern Markdown Editor & Document Generation for Developers</title>
  <meta name="description" content="BikDocs is the easiest way to turn your code into documentation. Generate, edit, and manage technical documentation directly from your GitHub repositories with our modern markdown editor." />
  <meta name="keywords" content="Markdown editor, document generation, developer documentation, GitHub documentation, BikDocs, technical writing, API documentation, developer tools" />
  <meta name="author" content="BikDocs" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://bikdocs.in/" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- Theme Color (matches your dark UI) -->
  <meta name="theme-color" content="#0A0B0D" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bikdocs.in/" />
  <meta property="og:title" content="BikDocs | Modern Markdown Editor & Document Generation" />
  <meta property="og:description" content="Generate, edit, and manage technical documentation directly from your GitHub repositories with our modern markdown editor." />
  <meta property="og:image" content="https://bikdocs.in/preview.png" />
  <meta property="og:site_name" content="BikDocs" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://bikdocs.in/" />
  <meta name="twitter:title" content="BikDocs | Modern Markdown Editor & Document Generation" />
  <meta name="twitter:description" content="Generate, edit, and manage technical documentation directly from your GitHub repositories with our modern markdown editor." />
  <meta name="twitter:image" content="https://bikdocs.in/preview.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Prevent white flash on dark mode -->
  <style>
    html,
    body {
      background-color: #0A0B0D;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <noscript>
    <div
      style="display:flex;align-items:center;justify-content:center;height:100vh;color:#aaa;font-family:Inter,sans-serif;background:#0A0B0D;">
      Please enable JavaScript to use BikDocs.
    </div>
  </noscript>
  <script type="module" src="/src/main.tsx"></script>

</html>
